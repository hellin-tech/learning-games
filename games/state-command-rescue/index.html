<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>State Command Rescue</title>
  <link rel="stylesheet" href="../../assets/css/cloudhelden.css">
</head>
<body>
<div class="cloudhelden-app">
  <div class="ch-header">
    <img src="../../assets/images/cloudhelden-logo.png" class="ch-logo" alt="Cloudhelden">
    <div>
      <span class="badge">Terraform State-Befehle</span>
      <h1>State Command Rescue</h1>
      <p>Wähle den passenden Befehl, ohne NovaTechs Infrastruktur unnötig zu zerstören.</p>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="caseBox" class="ch-card"></div>
  <div id="commands" class="terminal"></div>
  <div id="feedback"></div>

  <button class="primary" id="checkBtn">Befehl ausführen</button>
</div>

<script src="./script.js"></script>
</body>
</html>
