<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terraform State Lockdown</title>
  <link rel="stylesheet" href="../../assets/css/cloudhelden.css">
</head>
<body>
<div class="cloudhelden-app">
  <div class="ch-header">
    <img src="../../assets/images/cloudhelden-logo.png" class="ch-logo" alt="Cloudhelden">
    <div>
      <span class="badge">Terraform State & Teamarbeit</span>
      <h1>Terraform State Lockdown</h1>
      <p>Hilf Tom und Nina, den Staging-State sicher ins Team-Backend zu bringen.</p>
    </div>
  </div>

  <div class="status-grid">
    <div class="status-card"><h3>Stabilität</h3><div id="stability">50</div></div>
    <div class="status-card"><h3>Sicherheit</h3><div id="security">50</div></div>
    <div class="status-card"><h3>Teamfähigkeit</h3><div id="team">50</div></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="scenario" class="ch-card"></div>
  <div id="answers" class="answer-grid"></div>
  <div id="feedback"></div>

  <button class="primary" id="nextBtn">Antwort prüfen</button>
</div>

<script src="./script.js"></script>
</body>
</html>
