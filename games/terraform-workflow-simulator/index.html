<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Terraform Workflow Simulator</title>
  <link rel="stylesheet" href="../../assets/css/cloudhelden.css">
</head>
<body>

<div class="cloudhelden-app">

  <div class="ch-header">
    <img src="../../assets/images/cloudhelden-logo.png" class="ch-logo" alt="Cloudhelden">

    <div>
      <span class="badge">Terraform Workflow</span>
      <h1>Terraform Workflow Simulator</h1>
      <p>Führe NovaTech sicher von ClickOps zu Infrastructure as Code.</p>
    </div>
  </div>

  <div class="status-grid">

    <div class="status-card">
      <h3>Sicherheit</h3>
      <div id="securityScore">50</div>
    </div>

    <div class="status-card">
      <h3>Nachvollziehbarkeit</h3>
      <div id="auditScore">50</div>
    </div>

    <div class="status-card">
      <h3>Konsistenz</h3>
      <div id="consistencyScore">50</div>
    </div>

  </div>

  <div id="scenarioBox"></div>

  <div id="choices" class="answer-grid"></div>

  <div id="feedback"></div>

</div>

<script src="./script.js"></script>

</body>
</html>
