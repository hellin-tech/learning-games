<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Hannover Messe Load Spike</title>

  <link rel="stylesheet" href="../../assets/css/cloudhelden.css">
</head>
<body>

<div class="cloudhelden-app">

  <div class="ch-header">
    <img
      src="../../assets/images/cloudhelden-logo.png"
      class="ch-logo"
      alt="Cloudhelden">

    <div>
      <span class="badge">Production Readiness</span>

      <h1>Hannover Messe Load Spike</h1>

      <p>
        Halte NovaTechs Plattform während einer Lastspitze stabil.
      </p>
    </div>
  </div>

  <div class="status-grid">

    <div class="status-card">
      <h3>API-Stabilität</h3>
      <div id="stabilityScore">70</div>
    </div>

    <div class="status-card">
      <h3>Transparenz</h3>
      <div id="visibilityScore">40</div>
    </div>

    <div class="status-card">
      <h3>Skalierung</h3>
      <div id="scalingScore">30</div>
    </div>

  </div>

  <div id="scenarioBox"></div>

  <div id="choices" class="answer-grid"></div>

  <div id="feedback"></div>

</div>

<script src="./script.js"></script>

</body>
</html>
