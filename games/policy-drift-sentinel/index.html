<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Policy & Drift Sentinel</title>
  <link rel="stylesheet" href="../../assets/css/cloudhelden.css">
</head>
<body>
<div class="cloudhelden-app">
  <div class="ch-header">
    <img src="../../assets/images/cloudhelden-logo.png" class="ch-logo" alt="Cloudhelden">
    <div>
      <span class="badge">Policy-as-Code & Drift</span>
      <h1>Policy & Drift Sentinel</h1>
      <p>Entscheide, welche Terraform-Pläne NovaTechs Pipeline blockieren muss.</p>
    </div>
  </div>

  <div class="status-grid">
    <div class="status-card"><h3>Compliance</h3><div id="compliance">50</div></div>
    <div class="status-card"><h3>Security</h3><div id="security">50</div></div>
    <div class="status-card"><h3>Noise</h3><div id="noise">50</div></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="incidentBox" class="ch-card"></div>
  <div id="planBox" class="terminal"></div>
  <div id="answers" class="answer-grid"></div>
  <div id="feedback"></div>

  <button class="primary" id="checkBtn">Entscheidung prüfen</button>
</div>

<script src="./script.js"></script>
</body>
</html>
