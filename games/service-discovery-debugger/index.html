<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Service Discovery Debugger</title>

  <link rel="stylesheet" href="../../assets/css/cloudhelden.css">
</head>
<body>

<div class="cloudhelden-app">

  <div class="ch-header">

    <img
      src="../../assets/images/cloudhelden-logo.png"
      class="ch-logo"
      alt="Cloudhelden">

    <div>
      <span class="badge">Service Discovery</span>

      <h1>Service Discovery Debugger</h1>

      <p>
        Finde den Netzwerkfehler in NovaTechs Kubernetes-Setup.
      </p>
    </div>

  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="debugBox"></div>

  <div id="answers" class="answer-grid"></div>

  <button class="primary" id="nextBtn">
    Antwort prüfen
  </button>

  <div id="feedback"></div>

</div>

<script src="./script.js"></script>

</body>
</html>
