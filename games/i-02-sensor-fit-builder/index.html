<!DOCTYPE html>
<html lang="de">
<head>

  <title>Sensor Fit Builder</title>
  <link rel="stylesheet" href="../../assets/css/cloudhelden.css">
</head>
<body>
<div class="cloudhelden-app">

    <img src="../../assets/images/cloudhelden-logo.png" class="ch-logo" alt="Cloudhelden">

      <span class="badge">IoT · Sensorik</span>
      <h1>Sensor Fit Builder</h1>
