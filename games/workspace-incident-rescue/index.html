<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace Incident Rescue</title>
  <link rel="stylesheet" href="../../assets/css/cloudhelden.css">
</head>
<body>
<div class="cloudhelden-app">
  <div class="ch-header">
    <img src="../../assets/images/cloudhelden-logo.png" class="ch-logo" alt="Cloudhelden">
    <div>
      <span class="badge">Terraform Multi-Environment</span>
      <h1>Workspace Incident Rescue</h1>
      <p>Stoppe Ninas gefährlichen Plan, bevor Prod durch Dev ersetzt wird.</p>
    </div>
  </div>

  <div class="status-grid">
    <div class="status-card"><h3>Workspace</h3><div id="workspace">prod</div></div>
    <div class="status-card"><h3>tfvars</h3><div id="tfvars">dev.tfvars</div></div>
    <div class="status-card"><h3>Risiko</h3><div id="risk">hoch</div></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="caseBox" class="ch-card"></div>
  <div id="answers" class="answer-grid"></div>
  <div id="feedback"></div>

  <button class="primary" id="nextBtn">Entscheidung prüfen</button>
</div>

<script src="./script.js"></script>
</body>
</html>
