<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raspberry Pi Signal Rescue</title>
  <link rel="stylesheet" href="../../assets/css/cloudhelden.css">
</head>
<body>
<div class="cloudhelden-app">
  <div class="ch-header">
    <img src="../../assets/images/cloudhelden-logo.png" class="ch-logo" alt="Cloudhelden">
    <div>
      <span class="badge">GPIO · Busse · Aktoren</span>
      <h1>Raspberry Pi Signal Rescue</h1>
      <p>Hilf Markus, die Sensorik an CNC-Fräse 12 korrekt anzuschließen.</p>
    </div>
  </div>

  <div class="status-grid">
    <div class="status-card">
      <h3>Stabilität</h3>
      <div id="stability">100%</div>
    </div>
    <div class="status-card">
      <h3>Datenqualität</h3>
      <div id="quality">100%</div>
    </div>
    <div class="status-card">
      <h3>Sicherheit</h3>
      <div id="safety">100%</div>
    </div>
  </div>

  <div id="terminal" class="terminal incident-terminal"></div>
  <div id="choices" class="answer-grid"></div>

  <div id="feedback"></div>
</div>

<script src="./script.js"></script>
</body>
</html>
