<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IaC Decision Room</title>
  <link rel="stylesheet" href="../../assets/css/cloudhelden.css">
</head>
<body>
<div class="cloudhelden-app">
  <div class="ch-header">
    <img src="../../assets/images/cloudhelden-logo.png" class="ch-logo" alt="Cloudhelden">
    <div>
      <span class="badge">IaC-Architekturentscheidung</span>
      <h1>IaC Decision Room</h1>
      <p>Triff die richtigen Entscheidungen für NovaTechs IaC-Einführung.</p>
    </div>
  </div>

  <div class="status-grid">
    <div class="status-card"><h3>Compliance</h3><div id="compliance">50</div></div>
    <div class="status-card"><h3>Konsistenz</h3><div id="consistency">50</div></div>
    <div class="status-card"><h3>Zukunftssicherheit</h3><div id="future">50</div></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="caseBox" class="ch-card"></div>
  <div id="answers" class="answer-grid"></div>
  <div id="feedback"></div>

  <button class="primary" id="nextBtn">Entscheidung prüfen</button>
</div>

<script src="./script.js"></script>
</body>
</html>
