<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grafana Alert Ops</title>
  <link rel="stylesheet" href="../../assets/css/cloudhelden.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="cloudhelden-app">
  <div class="ch-header">
    <img src="../../assets/images/cloudhelden-logo.png" class="ch-logo" alt="Cloudhelden">
    <div>
      <span class="badge">Grafana · IoT Dashboards · Alerting</span>
      <h1>Grafana Alert Ops</h1>
      <p>Baue für Sarah und Lisa die richtigen Dashboard- und Alarmentscheidungen.</p>
    </div>
  </div>

  <div class="status-grid">
    <div class="status-card"><span>Übersicht</span><div id="overview">70</div></div>
    <div class="status-card"><span>Alarmqualität</span><div id="alerts">70</div></div>
    <div class="status-card"><span>Analysefähigkeit</span><div id="analysis">70</div></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="ops-layout">
    <section class="ch-card">
      <span id="roundBadge" class="badge">Auftrag 1</span>
      <h2 id="title"></h2>
      <p id="text"></p>

      <div class="mock-dashboard" id="mockDashboard">
        <div class="mock-panel">Factory Status</div>
        <div class="mock-panel">Temperature</div>
        <div class="mock-panel">Alerts</div>
      </div>

      <div class="terminal" id="dataBox"></div>
    </section>

    <section class="ch-card">
      <h2>Grafana-Entscheidung</h2>
      <div id="choices" class="choice-stack"></div>
      <button class="primary" id="nextBtn">Entscheidung prüfen</button>
      <div id="feedback"></div>
    </section>
  </div>

  <div class="ch-footer">Cloudhelden · Interaktive Lernaufgabe</div>
</div>

<script src="./script.js"></script>
</body>
</html>
