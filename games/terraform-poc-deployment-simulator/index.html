<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terraform PoC Deployment Simulator</title>
  <link rel="stylesheet" href="../../assets/css/cloudhelden.css">
</head>
<body>
<div class="cloudhelden-app">
  <div class="ch-header">
    <img src="../../assets/images/cloudhelden-logo.png" class="ch-logo" alt="Cloudhelden">
    <div>
      <span class="badge">Terraform Workflow</span>
      <h1>Terraform PoC Deployment Simulator</h1>
      <p>Hilf Tom, NovaTechs Staging-PoC sauber mit Terraform auszurollen.</p>
    </div>
  </div>

  <div class="status-grid">
    <div class="status-card"><h3>Provider</h3><div id="provider">❌</div></div>
    <div class="status-card"><h3>Plan Review</h3><div id="review">❌</div></div>
    <div class="status-card"><h3>Ressourcen</h3><div id="resources">0</div></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="mission" class="ch-card"></div>
  <div id="actions" class="answer-grid"></div>
  <div id="feedback"></div>

  <button class="primary" id="nextBtn">Aktion ausführen</button>
</div>

<script src="./script.js"></script>
</body>
</html>
