<!DOCTYPE html>

</head>
<body>

<div class="cloudhelden-app">

  <div class="ch-header">

    <img src="../../assets/images/cloudhelden-logo.png"
         class="ch-logo">

    <div>

      <div id="infra">100</div>

    <div class="status-card">
      <h3>Audit-Score</h3>
      <div id="audit">100</div>

  </div>

  <div id="choices" class="answer-grid"></div>
