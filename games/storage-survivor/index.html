<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Storage Survivor</title>

  <link rel="stylesheet" href="../../assets/css/cloudhelden.css">
</head>
<body>

<div class="cloudhelden-app">

  <div class="ch-header">
    <img
      src="../../assets/images/cloudhelden-logo.png"
      class="ch-logo"
      alt="Cloudhelden">

    <div>
      <span class="badge">Persistent Storage</span>

      <h1>Storage Survivor</h1>

      <p>
        Triff die richtigen Architekturentscheidungen für NovaTechs PostgreSQL.
      </p>
    </div>
  </div>

  <div class="status-grid">

    <div class="status-card">
      <h3>Datenintegrität</h3>
      <div id="dataScore">100</div>
    </div>

    <div class="status-card">
      <h3>Verfügbarkeit</h3>
      <div id="uptimeScore">100</div>
    </div>

    <div class="status-card">
      <h3>Kostenkontrolle</h3>
      <div id="costScore">100</div>
    </div>

  </div>

  <div id="scenarioBox"></div>

  <div id="choices" class="answer-grid"></div>

  <div id="feedback"></div>

</div>

<script src="./script.js"></script>

</body>
</html>
